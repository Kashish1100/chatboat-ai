<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<div class="main">
<div class="card">

<h1>📊 Result</h1>

<h3>Match Score</h3>
<h2>{{ score }}%</h2>

<div class="progress">
    <div class="progress-bar" style="width: {{ score }}%"></div>
</div>

<h3>{{ message }}</h3>

<hr>

<h3>✅ Matched Skills</h3>
<p>{{ matched }}</p>

<h3>❌ Missing Skills</h3>
<p>{{ missing }}</p>

<a href="/">⬅ Try Again</a>

</div>
</div>
